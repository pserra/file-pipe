    intensity: 0.82
    videoSample: bottom
    videoSampleMultiplier: "$video_reactive_light"
    videoSampleMinIntensity: 0
    videoSampleMaxIntensity: 1.1
    distance: 3.6
    decay: 2
  - id: glyph-wash
    type: point
    position: [0, 1.58, 0.52]
    color: "#e7f7ff"
    intensitySetting: glyph_brightness
    visibleSetting: glyphs_on
    distance: 4.8
