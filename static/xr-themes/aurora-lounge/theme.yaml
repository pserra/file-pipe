id: aurora-lounge
name: Aurora Lounge
background: "#02040a"
floor:
  color: "#1f2428"
  accent: "#e5edf5"
  grid: true
  size: 8.8
  divisions: 18
  y: -1.72
settings:
  - id: glyphs_on
    label: Glyph lights
    type: boolean
    default: true
  - id: glyph_brightness
    label: Glyph brightness
    type: number
    min: 0
    max: 1.6
    step: 0.05
    default: 0.9
  - id: lounge_key_light
    label: Lounge key light
    type: number
    min: 0
    max: 2.5
    step: 0.1
    default: 1.1
  - id: floor_accent
    label: Floor accents
    type: number
    min: 0
    max: 1.4
    step: 0.05
    default: 0.75
  - id: surface_detail
    label: Surface detail
    type: number
    min: 0
    max: 1
    step: 0.05
    default: 0.55
lights:
  - id: lounge-fill
    type: ambient
    color: "#aeb8c7"
    intensity: 0.42
  - id: display-wash
    type: point
    position: [0, 0.9, -3.25]
    color: "#9ecfff"
    intensitySetting: lounge_key_light
    distance: 5.8
    decay: 2
  - id: glyph-wash
    type: point
    position: [0, 1.6, -3.5]
    color: "#e7f7ff"
    intensitySetting: glyph_brightness
    visibleSetting: glyphs_on
    distance: 6
    decay: 2
  - id: floor-accent-wash
    type: point
    position: [0, -1.18, -0.9]
    color: "#8edcff"
    intensitySetting: floor_accent
    distance: 4.4
    decay: 2
