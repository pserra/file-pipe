id: aurora-lounge
name: Aurora Lounge
background: "#02040a"
settingsRevision: 3
settingsRevisionDefaults:
  glyphs_on: true
  glyph_brightness: 0.78
desktop:
  fov: 74
videoSampling: true
floor:
  color: "#1f2428"
  accent: "#e5edf5"
  grid: true
  size: 9.8
  divisions: 20
  y: -1.72
settings:
  - id: glyphs_on
    label: Glyph lights
    type: boolean
    default: true
  - id: glyph_brightness
    label: Glyph brightness
    type: number
    min: 0
    max: 1.6
    step: 0.05
    default: 0.78
  - id: lounge_key_light
    label: Lounge key light
    type: number
    min: 0
    max: 2.5
    step: 0.1
    default: 1.1
  - id: floor_accent
    label: Floor accents
    type: number
    min: 0
    max: 1.4
    step: 0.05
    default: 0.52
  - id: video_reactive_light
    label: Video reactive wash
    type: number
    min: 0
    max: 2
    step: 0.05
    default: 0.8
  - id: surface_detail
    label: Surface detail
    type: number
    min: 0
    max: 1
    step: 0.05
    default: 0.62
lights:
  - id: lounge-fill
    type: ambient
    color: "#aeb8c7"
    intensity: 0.42
  - id: display-wash
    type: point
    position: [0, 0.9, -3.25]
    color: "#9ecfff"
    intensitySetting: lounge_key_light
    distance: 5.8
    decay: 2
  - id: video-edge-wash
    type: point
    position: [0, 0.58, -3.08]
    color: "#8fdcff"
    intensity: 1.35
    videoSample: average
    videoSampleMultiplier: "$video_reactive_light"
    videoSampleMinIntensity: 0
    videoSampleMaxIntensity: 2.2
    distance: 5.4
    decay: 2
  - id: video-floor-bounce
