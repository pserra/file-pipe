id: enterprise-d-bridge
name: Enterprise-D Bridge
background: "#060504"
settingsRevision: 4
settingsRevisionDefaults:
  bridge_key_light: 0.18
  bridge_display_glow: 0.22
  bridge_dome_opacity: 0.18
calibration:
  units: meters
  roomScale: 0.359
  reference:
    kind: bridge_width
    actualMeters: 10.67
    assetMeters: 29.7
defaultsRevision: 7
defaults:
  roomDim: 25
  roomViewX: 0
  roomViewY: 1.45
  roomViewZ: 0.9
  roomViewYaw: 0
  roomViewPitch: -12
screenMount:
  label: Main viewer
  defaults:
    panelWidth: 2.08
    panelHeight: 1.17
    screenCurve: 15
    viewportWarp: 0
    panelX: -0.05
    panelY: 0.15
    panelYaw: 0
    panelPitch: 0
    distance: 2.5
desktop:
  fov: 72
seating:
  - id: captains-chair
    label: Captain's chair
    position: [0, 0.56, 0.18]
    avatarPosition: [0, -0.39, 0.18]
    yaw: 0
    pitch: -10
    avatarOffset: [0, 0, 0.18]
    avatarCushionToTop: 0.66
    avatarBackOffset: 0.025
  - id: first-officer
    label: First officer
    position: [-0.58, 0.52, 0.04]
    avatarPosition: [-0.58, -0.43, 0.04]
    yaw: 4
    pitch: -10
    avatarOffset: [0, 0, 0.18]
    avatarCushionToTop: 0.66
    avatarBackOffset: 0.025
  - id: counselor
    label: Counselor
    position: [0.5, 0.52, 0.04]
    avatarPosition: [0.5, -0.43, 0.04]
    yaw: -4
    pitch: -10
    avatarOffset: [0, 0, 0.18]
    avatarCushionToTop: 0.66
    avatarBackOffset: 0.025
  - id: conn
    label: Conn
    position: [-0.41, 0.48, -1.55]
    avatarPosition: [-0.41, -0.47, -1.55]
    yaw: 0
    pitch: -8
    avatarOffset: [0, 0, 0.16]
    avatarCushionToTop: 0.64
    avatarBackOffset: 0.025
  - id: ops
    label: Ops
    position: [0.29, 0.48, -1.55]
    avatarPosition: [0.29, -0.47, -1.55]
    yaw: 0
    pitch: -8
    avatarOffset: [0, 0, 0.16]
    avatarCushionToTop: 0.64
    avatarBackOffset: 0.025
videoSampling: true
floor:
  grid: false
render:
  globalAmbient: 0.18
  exposure: 1.08
  shadows: true
  xrFramebufferScale: 0.9
settings:
  - id: bridge_key_light
    label: Bridge key light
    type: number
    min: 0
    max: 2.5
    step: 0.05
    default: 0.18
  - id: bridge_display_glow
    label: Console glow
    type: number
    min: 0
    max: 1.6
    step: 0.05
    default: 0.22
  - id: bridge_dome_opacity
    label: Dome glass
    type: number
    min: 0
    max: 0.95
    step: 0.02
    default: 0.18
lights:
  - id: bridge-ambient
    type: ambient
    color: "#d8c6a8"
    intensity: 0.08
  - id: bridge-key
    type: directional
    color: "#fff4d5"
    intensitySetting: bridge_key_light
    position: [0.4, 2.4, -1.8]
    target: [0, -0.2, -3.2]
    castShadow: true
    shadowMapSize: 1024
    shadowCameraSize: 4
    shadowNear: 0.1
    shadowFar: 8
  - id: bridge-dome-fill
    type: hemisphere
    color: "#fff8e7"
    groundColor: "#382315"
    intensitySetting: bridge_dome_opacity
    intensityMultiplier: 3.4
    position: [0, 2.22, -0.52]
  - id: bridge-dome-wash
    type: point
    color: "#fff8e7"
    intensitySetting: bridge_dome_opacity
    intensityMultiplier: 9.5
    distance: 5.2
    decay: 1.25
    position: [0, 2.18, -0.52]
  - id: bridge-screen-wash
    type: point
    color: "#9ec9ff"
    intensity: 0.62
    videoSample: average
    videoSampleMultiplier: 0.72
    videoSampleMinIntensity: 0.15
    videoSampleMaxIntensity: 1.45
    distance: 5.5
    decay: 2
    position: [0, 0.45, -3.05]
assets:
  - type: glb
    id: enterprise-d-bridge-model
    file: assets/enterprise_d_bridge.glb
    position: [0, -0.6, 0.64]
    rotation: [0, 180, 0]
    scale: [0.00655, 0.00655, 0.00655]
    preferEmbeddedTextures: true
    excludeNodes:
      - Tomalok
      - D'deridex
      - "498006_4"
      - "498006_4.001"
      - directional
      - directional.001
      - White Ceiling Light
    excludeNodePrefixes:
      - Text
    glassOpacity: 0.26
    displayEmissiveIntensity: "$bridge_display_glow"
    castShadow: true
    receiveShadow: true
    nodeAdjustments:
      - name: plaque
        positionOffset: [0, 0, 0.305]
    materialMap:
      Grey Carpet:
        color: "#6b6b60"
        roughness: 0.9
      Red Carpet:
        color: "#77170f"
        roughness: 0.86
      Beige:
