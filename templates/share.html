<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure File Pipe Share</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='13') }}">
    <script defer src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>
    <script defer src="{{ url_for('static', filename='share.js', v='4') }}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="app-body" x-data="fileShare('{{ share_id }}')" x-init="loadManifest()">
    <header class="app-header">
      <div class="container-fluid py-3">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <div class="brand-lockup">
            <div class="brand-mark"><i class="bi bi-shield-lock"></i></div>
            <div>
              <div class="text-uppercase text-secondary fw-semibold small">Encrypted share</div>
              <h1 class="h3 mb-0">File Pipe</h1>
            </div>
          </div>
          <form method="post" action="{{ url_for('logout') }}">
            <button class="btn btn-outline-secondary" type="submit">
              <i class="bi bi-box-arrow-right"></i>
              Sign out
            </button>
          </form>
        </div>
      </div>
    </header>

    <main class="share-page">
      <section class="card shadow-sm">
        <div class="card-body">
        <h2 class="h5" x-text="metadata ? metadata.name : 'Loading secure file'"></h2>
        <template x-if="metadata">
          <p class="text-secondary">
            <span x-text="metadata ? formatBytes(metadata.size) : ''"></span>
            <span x-show="metadata && metadata.type"> · </span>
            <span x-text="metadata ? metadata.type : ''"></span>
          </p>
        </template>

        <template x-if="metadata">
          <div class="card border-warning mb-3">
            <div class="card-header bg-warning-subtle fw-semibold">
              Download acknowledgement required
            </div>
            <div class="card-body">
              <dl class="row mb-3">
                <dt class="col-sm-3">File</dt>
                <dd class="col-sm-9 text-break" x-text="metadata.name"></dd>
                <dt class="col-sm-3">Size</dt>
                <dd class="col-sm-9" x-text="formatBytes(metadata.size)"></dd>
                <dt class="col-sm-3">Type</dt>
                <dd class="col-sm-9" x-text="metadata.type || 'application/octet-stream'"></dd>
                <dt class="col-sm-3">MD5</dt>
                <dd class="col-sm-9 font-monospace text-break" x-text="metadata.md5 || 'Unavailable'"></dd>
              </dl>
              <div class="form-check">
                <input class="form-check-input" id="download-acknowledgement" type="checkbox" x-model="acknowledgementAccepted" :disabled="!metadata.md5">
                <label class="form-check-label" for="download-acknowledgement">
                  I acknowledge the file listed above, including its MD5 checksum, and confirm that I own this file or have the proper rights to download it.
                </label>
              </div>
              <template x-if="!metadata.md5">
                <div class="alert alert-danger mt-3 mb-0">
                  This share was created without an MD5 checksum and cannot be downloaded under the current policy.
                </div>
              </template>
            </div>
          </div>
        </template>

        <template x-if="error">
          <div class="alert alert-danger" x-text="error"></div>
        </template>

        <template x-if="status">
          <div class="share-status">
            <div>
              <strong x-text="status"></strong>
              <span x-show="progress" x-text="`${progress}%`"></span>
            </div>
            <progress max="100" :value="progress || 0"></progress>
          </div>
        </template>

        <div class="download-actions">
          <button class="btn btn-primary" type="button" @click="download()" :disabled="!metadata || !metadata.md5 || !acknowledgementAccepted || downloading">
            <i class="bi bi-unlock"></i>
            <span x-text="downloading ? 'Receiving' : 'Acknowledge and receive'"></span>
          </button>
          <a
            class="btn btn-success"
            x-show="downloadUrl"
            :href="downloadUrl"
            :download="metadata ? metadata.name : 'file-pipe-download'"
          ><i class="bi bi-download"></i> Save file</a>
        </div>

        <template x-if="verifiedMd5">
          <div class="alert alert-success">
            Verified decrypted MD5:
            <span class="font-monospace" x-text="verifiedMd5"></span>
          </div>
        </template>

        <p class="text-secondary mb-0">
          File contents are streamed peer-to-peer from the sender and decrypted in this browser using the key in the URL fragment.
          The hosted server only exchanges WebRTC signaling data.
        </p>
        </div>
      </section>
    </main>
  </body>
</html>
