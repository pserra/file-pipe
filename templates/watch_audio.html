<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File Pipe Audio Output</title>
    <link href="{{ local_static_or_cdn('vendor/bootstrap/bootstrap.min.css', 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ local_static_or_cdn('vendor/bootstrap-icons/bootstrap-icons.css', 'https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='25') }}">
    <script defer src="{{ local_static_or_cdn('vendor/hls.js/hls.min.js', 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js') }}"></script>
    <script>window.FILE_PIPE_P2P_CONFIG = {{ p2p_config()|tojson }};</script>
    <script defer src="{{ url_for('static', filename='js/pages/watch-audio/helpers.js', v='2') }}"></script>
    <script defer src="{{ url_for('static', filename='js/pages/watch-audio/index.js', v='7') }}"></script>
    <script defer src="{{ local_static_or_cdn('vendor/alpinejs/cdn.min.js', 'https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js') }}"></script>
  </head>
  <body class="app-body" x-data="watchAudioOutput('{{ room_id }}')" x-init="initAudioOutput()">
    <main class="container py-5">
      <div class="mx-auto" style="max-width: 760px;">
        <div class="card shadow-sm">
          <div class="card-header d-flex align-items-center justify-content-between gap-3">
            <div>
              <div class="text-uppercase text-secondary fw-semibold small">External audio output</div>
              <h1 class="h4 mb-0" x-text="metadata ? metadata.name : 'File Pipe audio output'"></h1>
            </div>
            <span class="badge" :class="channelReady ? 'text-bg-success' : 'text-bg-secondary'" x-text="channelReady ? 'Connected' : 'Waiting'"></span>
          </div>
          <div class="card-body">
            <template x-if="error">
              <div class="alert alert-danger" x-text="error"></div>
            </template>
            <template x-if="status">
              <div class="alert alert-info" x-text="status"></div>
            </template>

            <dl class="row mb-3">
              <dt class="col-sm-4">Output channel</dt>
              <dd class="col-sm-8" x-text="channelLabel"></dd>
              <dt class="col-sm-4">Following</dt>
              <dd class="col-sm-8" x-text="targetLabel"></dd>
              <dt class="col-sm-4">Audio layout</dt>
              <dd class="col-sm-8" x-text="audioLayoutLabel()"></dd>
              <dt class="col-sm-4">Sync</dt>
              <dd class="col-sm-8" x-text="lastSyncLabel || 'Pending'"></dd>
            </dl>

            <div class="d-flex flex-wrap gap-2 mb-3">
              <button class="btn btn-primary" type="button" @click="startOutput()" :disabled="starting">
                <i class="bi bi-play-fill"></i>
                <span x-text="starting ? 'Starting output' : (outputReady ? 'Restart output' : 'Start output')"></span>
              </button>
              <button class="btn btn-outline-primary" type="button" @click="castOutput()" :disabled="starting">
                <i class="bi bi-cast"></i>
                Cast
              </button>
              <button class="btn btn-outline-secondary" type="button" @click="stopOutput()" :disabled="!outputReady && !videoUrl">
                <i class="bi bi-stop-fill"></i>
                Stop
              </button>
            </div>
            <template x-if="castStatus">
              <div class="alert alert-secondary py-2" x-text="castStatus"></div>
            </template>

            <label class="form-label">Output volume</label>
            <div class="d-flex align-items-center gap-3">
              <input class="form-range" type="range" min="0" max="1" step="0.01" x-model.number="volume" @input="applyOutputVolume()">
              <span class="text-secondary" x-text="`${Math.round(volume * 100)}%`"></span>
            </div>

            <label class="form-label d-flex justify-content-between mt-3">
              <span>Sync offset</span>
              <span class="text-secondary" x-text="`${Math.round(outputDelayMs)} ms`"></span>
            </label>
            <input class="form-range" type="range" min="-750" max="750" step="5" x-model.number="outputDelayMs" @input="applyOutputDelay()">
            <div class="form-text">Positive values delay this output; negative values play it earlier.</div>

            <video id="watch-audio-output-media" class="visually-hidden" crossorigin="anonymous" preload="auto" playsinline></video>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
