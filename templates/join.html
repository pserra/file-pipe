<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Joining File Pipe Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='18') }}">
  </head>
  <body class="app-body login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand-lockup mb-3">
          <div class="brand-mark"><i class="bi bi-door-open"></i></div>
          <div>
            <div class="text-uppercase text-secondary fw-semibold small">Joining room</div>
            <h1 class="h3 mb-0">{{ alias }}</h1>
          </div>
        </div>
        <div class="d-flex align-items-center gap-3 text-secondary">
          <span class="spinner-border text-primary" aria-hidden="true"></span>
          <span>Opening the watch room.</span>
        </div>
      </section>
    </main>

    <script>
      window.location.replace("{{ watch_path }}" + window.location.hash);
    </script>
  </body>
</html>
