<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File Pipe Watch Room</title>
    <link href="{{ local_static_or_cdn('vendor/bootstrap/bootstrap.min.css', 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ local_static_or_cdn('vendor/bootstrap-icons/bootstrap-icons.css', 'https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='31') }}">
    <script defer src="{{ local_static_or_cdn('vendor/spark-md5/spark-md5.min.js', 'https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js') }}"></script>
    <script defer src="{{ local_static_or_cdn('vendor/hls.js/hls.min.js', 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js') }}"></script>
    <script defer src="{{ local_static_or_cdn('vendor/three/three.min.js', 'https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js') }}"></script>
    <script defer src="{{ local_static_or_cdn('vendor/onnxruntime-web/ort.webgpu.min.js', 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.26.0/dist/ort.webgpu.min.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/player/local-depth3d.js', v='1') }}"></script>
    <script defer src="{{ url_for('static', filename='js/player/xr-player.js', v='46') }}"></script>
    <script defer src="{{ url_for('static', filename='js/player/playback-progress.js', v='2') }}"></script>
    <script>window.FILE_PIPE_P2P_CONFIG = {{ p2p_config()|tojson }};</script>
    <script defer src="{{ url_for('static', filename='js/pages/watch/helpers.js', v='5') }}"></script>
    <script defer src="{{ url_for('static', filename='js/pages/watch/index.js', v='64') }}"></script>
    <script defer src="{{ local_static_or_cdn('vendor/alpinejs/cdn.min.js', 'https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js') }}"></script>
  </head>
  <body class="app-body" x-data="watchRoom('{{ room_id }}')" x-init="initWatchRoom()">
    <header class="app-header">
      <div class="container-fluid app-header-inner">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <div class="brand-lockup">
            <div class="brand-mark"><i class="bi bi-people"></i></div>
            <div>
              <div class="text-uppercase text-secondary fw-semibold small">Encrypted watch room</div>
              <h1 class="h3 mb-0">File Pipe</h1>
            </div>
          </div>
          <form method="post" action="{{ url_for('logout') }}">
            <button class="btn btn-outline-secondary" type="submit">
              <i class="bi bi-box-arrow-right"></i>
              Sign out
            </button>
          </form>
        </div>
      </div>
    </header>

    <main class="container py-4">
      <template x-if="error">
        <div class="alert alert-danger" x-text="error"></div>
      </template>

      <template x-if="recoveryStatus">
        <div class="alert" :class="networkOnline ? 'alert-info' : 'alert-warning'">
          <i class="bi" :class="networkOnline ? 'bi-wifi' : 'bi-wifi-off'"></i>
          <span class="ms-1" x-text="recoveryStatus"></span>
        </div>
      </template>

      <div class="row g-4 xr-theater-layout">
        <div class="col-12 col-xl-8 xr-video-column">
          <div class="card shadow-sm xr-video-card">
            <div class="card-header">
              <div class="fw-semibold" x-text="metadata ? metadata.name : 'Loading room'"></div>
              <small class="text-secondary" x-text="status"></small>
            </div>
            <div class="card-body">
              <template x-if="!participantId">
                <form @submit.prevent="joinRoom()">
                  <label class="form-label">Your name</label>
                  <div class="input-group">
                    <input class="form-control" type="text" x-model="viewerName" maxlength="80" autocomplete="name" required>
                    <button class="btn btn-primary" type="submit">Join room</button>
                  </div>
                </form>
              </template>

              <template x-if="metadata && participantId && !acknowledgementAccepted">
                <div class="card border-warning mb-3">
                  <div class="card-header bg-warning-subtle fw-semibold">Viewing acknowledgement required</div>
                  <div class="card-body">
                    <dl class="row mb-3">
                      <dt class="col-sm-3">File</dt>
                      <dd class="col-sm-9 text-break" x-text="metadata.name"></dd>
                      <dt class="col-sm-3">Host</dt>
                      <dd class="col-sm-9 text-break" x-text="metadata.hostName || 'Host'"></dd>
                      <dt class="col-sm-3">Size</dt>
                      <dd class="col-sm-9" x-text="formatBytes(metadata.size)"></dd>
                      <dt class="col-sm-3">Type</dt>
                      <dd class="col-sm-9" x-text="metadata.type || 'video/mp4'"></dd>
                      <dt class="col-sm-3">MD5</dt>
                      <dd class="col-sm-9 font-monospace text-break" x-text="metadata.md5 || (metadata.checksumKind === 'hls-segments' ? 'Live HLS stream; segments are encrypted in transit' : (metadata.checksumKind === 'original-source' ? 'Progressive transcode; ranges are verified during playback' : 'Unavailable'))"></dd>
                    </dl>
                    <template x-if="canSwitchPlaybackModes()">
                      <div class="mb-3">
                        <label class="form-label">Playback mode</label>
                        <div class="btn-group w-100" role="group" aria-label="Playback mode">
                          <template x-for="mode in availablePlaybackModes()" :key="mode.id">
                            <button class="btn" type="button" :class="selectedPlaybackMode === mode.id ? 'btn-primary' : 'btn-outline-primary'" :disabled="mode.disabled" @click="setPlaybackMode(mode.id)">
                              <span x-text="mode.label"></span>
                            </button>
                          </template>
                        </div>
                        <div class="form-text" x-text="playbackModeHelpText()"></div>
                      </div>
                    </template>
                    <button class="btn btn-primary mt-3" type="button" @click="requestVideo()">
                      <i class="bi bi-broadcast"></i>
                      <span x-text="receiveButtonLabel()"></span>
                    </button>
                    <template x-if="receiveDisabledReason()">
                      <div class="form-text" x-text="receiveDisabledReason()"></div>
                    </template>
                  </div>
                </div>
              </template>

              <template x-if="metadata && participantId && acknowledgementAccepted && !videoUrl">
                <button class="btn btn-primary mb-3" type="button" @click="requestVideo()">
                  <i class="bi bi-broadcast"></i>
                  <span x-text="receiveButtonLabel()"></span>
                </button>
              </template>

              <template x-if="progress && !videoUrl">
                <div class="mb-3">
                  <div class="d-flex justify-content-between small text-secondary">
                    <span>Encrypted transfer</span>
                    <span x-text="`${progress}%`"></span>
                  </div>
                  <div class="progress">
                    <div class="progress-bar" :style="`width: ${progress}%`"></div>
                  </div>
                </div>
              </template>

              <template x-if="videoUrl">
                <div class="xr-video-window">
                  <template x-if="canSwitchPlaybackModes()">
                    <div class="btn-group btn-group-sm mb-3" role="group" aria-label="Playback mode">
                      <template x-for="mode in availablePlaybackModes()" :key="mode.id">
                        <button class="btn" type="button" :class="selectedPlaybackMode === mode.id ? 'btn-primary' : 'btn-outline-primary'" :disabled="mode.disabled" @click="setPlaybackMode(mode.id)">
                          <span x-text="mode.label"></span>
                        </button>
                      </template>
                    </div>
                  </template>
                  <div class="mb-3">
                    <div class="d-flex justify-content-between small text-secondary">
                      <span>Playback buffer</span>
                      <span x-text="`${playbackBufferSeconds.toFixed(1)}s`"></span>
                    </div>
                    <div class="progress">
                      <div class="progress-bar" :style="`width: ${playbackBufferPercent}%`"></div>
                    </div>
                    <template x-if="mediaPrefetchStatus">
                      <div class="form-text" x-text="mediaPrefetchStatus"></div>
                    </template>
                  </div>
                  <video id="viewer-video-player" class="w-100 rounded border bg-black" crossorigin="anonymous" :controls="!viewerProgressivePlaybackLocked()" preload="auto" playsinline @loadedmetadata="prepareViewerVideoMedia(); updateViewerPlaybackBuffer(); updateViewerLinearPlaybackTime()" @progress="updateViewerPlaybackBuffer()" @timeupdate.throttle.500ms="updateViewerPlaybackBuffer(); updateViewerLinearPlaybackTime()" @waiting="updateViewerPlaybackBuffer()" @canplay="checkPendingSegmentReadiness(); updateViewerPlaybackBuffer()" @playing="setTimeout(() => { inspectViewerVideoAudio(); updateViewerPlaybackBuffer(); updateViewerLinearPlaybackTime(); publishViewerPlaybackState('playing'); }, 1000)" @play="sendViewerControl('play'); publishViewerPlaybackState('play')" @pause="sendViewerControl('pause'); publishViewerPlaybackState('pause')" @seeking="handleViewerSeeking()" @seeked="handleViewerSeeked()"></video>
                  <template x-if="viewerProgressivePlaybackLocked()">
                    <div class="d-flex flex-wrap align-items-center gap-2 mt-3">
                      <button class="btn btn-primary" type="button" @click="toggleViewerLinearPlayback()">
                        <i class="bi bi-play-fill"></i>
                        <span>Play / Pause</span>
                      </button>
                      <span class="small text-secondary" x-text="progressivePlaybackLabel()"></span>
                    </div>
                  </template>
                  <template x-if="videoAudioStatus">
                    <div class="alert alert-secondary mt-3 mb-0" x-text="videoAudioStatus"></div>
                  </template>
                  <template x-if="verifiedMd5">
                    <div class="alert alert-success mt-3">
                      Verified decrypted MD5:
                      <span class="font-monospace" x-text="verifiedMd5"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>

        <aside class="col-12 col-xl-4 xr-side-panel">
          <div class="card">
            <div class="card-header fw-semibold">Room status</div>
            <div class="list-group list-group-flush">
	              <div class="list-group-item d-flex justify-content-between gap-3">
	                <span>Name</span>
	                <div class="voice-name-row justify-content-end min-w-0">
	                  <span class="text-secondary text-truncate" x-text="viewerName || 'Not joined'"></span>
	                  <div class="voice-activity" :class="{ 'voice-activity-muted': selfMuted || voiceMutedByHost || !micStream }">
	                    <i class="bi" :class="voiceActivityIconClass(selfVoiceLevel, selfMuted || voiceMutedByHost, Boolean(micStream))"></i>
	                    <span class="voice-activity-bar"><span :style="voiceLevelStyle(selfVoiceLevel)"></span></span>
	                  </div>
	                </div>
	              </div>
              <div class="list-group-item d-flex justify-content-between">
                <span>Peer connection</span>
                <span class="badge" :class="channelReady ? 'text-bg-success' : 'text-bg-secondary'" x-text="channelReady ? 'Connected' : 'Waiting'"></span>
              </div>
              <div class="list-group-item d-flex justify-content-between">
                <span>Playback control</span>
                <span class="badge" :class="remoteControlAllowed ? 'text-bg-success' : 'text-bg-secondary'" x-text="remoteControlAllowed ? 'Shared' : 'Host only'"></span>
              </div>
              <div class="list-group-item">
                <button class="btn btn-sm btn-outline-primary w-100" type="button" @click="reconnectToHost()" :disabled="!participantId || reconnecting">
                  <i class="bi bi-arrow-clockwise"></i>
                  <span x-text="reconnecting ? 'Reconnecting' : 'Reconnect to host'"></span>
                </button>
              </div>
              <div class="list-group-item d-flex justify-content-between">
                <span>Sync</span>
                <span class="text-secondary" x-text="lastSyncLabel || 'Pending'"></span>
              </div>
              <div class="list-group-item">
                <div class="d-flex gap-2 mb-2">
                  <button class="btn btn-sm btn-outline-primary flex-fill" type="button" @click="createParticipantAudioOutputLink('LFE')" :disabled="!participantId">
                    <i class="bi bi-speaker"></i>
                    <span>LFE output link</span>
                  </button>
                  <button class="btn btn-sm btn-success" type="button" @click="copyToClipboard(audioOutputLink)" :disabled="!audioOutputLink">
                    <i class="bi bi-clipboard"></i>
                  </button>
                </div>
                <input class="form-control form-control-sm" type="text" readonly :value="audioOutputLink" placeholder="Create an audio output link" @focus="$event.target.select()">
                <div class="form-text">Open on the browser connected to the audio device. It follows this participant's playback clock.</div>
                <template x-if="audioOutputStatus">
                  <div class="small text-secondary mt-2" x-text="audioOutputStatus"></div>
                </template>
              </div>
            </div>
          </div>

	          <div class="card mt-3 voice-chat-card">
	            <div class="card-header d-flex align-items-center justify-content-between">
	              <span class="fw-semibold">Voice audio</span>
	              <span class="badge" :class="voiceEnabled ? 'text-bg-success' : 'text-bg-secondary'" x-text="viewerVoiceLabel()"></span>
	            </div>
	            <div class="card-body">
	              <div class="voice-name-row mb-3">
	                <span class="fw-semibold">Host</span>
	                <div class="voice-activity" :class="{ 'voice-activity-muted': hostVoiceMuted || hostVoiceSelfMuted || !hostVoiceAvailable }">
	                  <i class="bi" :class="voiceActivityIconClass(hostVoiceLevel, hostVoiceMuted || hostVoiceSelfMuted, hostVoiceAvailable)"></i>
	                  <span class="voice-activity-bar"><span :style="voiceLevelStyle(hostVoiceLevel)"></span></span>
	                </div>
	              </div>
	              <div class="d-flex gap-2 mb-3">
	                <button class="btn btn-outline-primary flex-fill" type="button" @click="enableViewerVoice()" :disabled="voiceMutedByHost">
	                  <i class="bi bi-mic"></i>
	                  <span x-text="micStream && selfMuted ? 'Unmute voice' : 'Enable voice'"></span>
	                </button>
	                <button class="btn btn-outline-secondary" type="button" @click="stopViewerVoice()" :disabled="!micStream || selfMuted">
	                  <i class="bi bi-mic-mute"></i>
	                </button>
	              </div>
	              <button class="btn btn-sm w-100 mb-3" :class="hostVoiceMuted ? 'btn-secondary' : 'btn-outline-secondary'" type="button" @click="toggleHostAudioMute()">
	                <i class="bi" :class="hostVoiceMuted ? 'bi-volume-mute' : 'bi-volume-up'"></i>
	                <span x-text="hostVoiceMuted ? 'Unmute host' : 'Mute host here'"></span>
	              </button>

	              <label class="form-label">Microphone</label>
	              <select class="form-select mb-3" x-model="voiceInputId" @change="changeViewerVoiceInput()">
                <option value="">Default microphone</option>
                <template x-for="device in audioInputs" :key="device.deviceId">
                  <option :value="device.deviceId" x-text="device.label || 'Microphone'"></option>
                </template>
              </select>

              <label class="form-label">Headphones</label>
              <select class="form-select mb-3" x-model="voiceOutputId" @change="setViewerAudioOutput()">
                <option value="">Default output</option>
                <template x-for="device in audioOutputs" :key="device.deviceId">
                  <option :value="device.deviceId" x-text="device.label || 'Audio output'"></option>
                </template>
              </select>

              <label class="form-label d-flex justify-content-between">
                <span>Media volume</span>
                <span x-text="`${Math.round(mediaVolume * 100)}%`"></span>
              </label>
              <input class="form-range" type="range" min="0" max="1" step="0.01" x-model.number="mediaVolume" @input="applyViewerVolumes()">

              <label class="form-label d-flex justify-content-between mt-2">
                <span>Participant volume</span>
                <span x-text="`${Math.round(participantVolume * 100)}%`"></span>
              </label>
              <input class="form-range" type="range" min="0" max="1" step="0.01" x-model.number="participantVolume" @input="applyViewerVolumes()">

              <template x-if="voiceStatus">
                <div class="form-text" x-text="voiceStatus"></div>
              </template>
              <audio id="viewer-voice-audio" autoplay playsinline></audio>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
