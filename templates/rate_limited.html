<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slow down - File Pipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='18') }}">
  </head>
  <body class="app-body login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand-lockup mb-4">
          <div class="brand-mark"><i class="bi bi-hourglass-split"></i></div>
          <div>
            <div class="text-uppercase text-secondary fw-semibold small">Rate limited</div>
            <h1 class="h3 mb-0">File Pipe</h1>
          </div>
        </div>
        <div class="alert alert-warning mb-0" role="alert">
          Too many room access requests. Try again in {{ retry_after }} seconds.
        </div>
      </section>
    </main>
  </body>
</html>
