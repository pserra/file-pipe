<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File Pipe Bigscreen Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='16') }}">
    <script defer src="{{ url_for('static', filename='xr-player.js', v='1') }}"></script>
    <script defer src="{{ url_for('static', filename='bigscreen.js', v='6') }}"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-black text-white" x-data="bigscreenPlayer('{{ session_id }}')" x-init="initBigscreen()">
    <main class="bigscreen-shell">
      <template x-if="!playerStarted">
        <section class="container py-5">
          <div class="mx-auto bigscreen-start-panel">
            <div class="text-uppercase text-info fw-semibold small mb-2">File Pipe Bigscreen</div>
            <h1 class="h3 mb-3" x-text="metadata ? metadata.name : 'Loading video link'"></h1>
            <p class="text-secondary" x-text="status"></p>

            <template x-if="error">
              <div class="alert alert-danger" x-text="error"></div>
            </template>

            <template x-if="metadata">
              <div class="card bg-dark border-secondary text-white mb-3">
                <div class="card-body">
                  <dl class="row mb-3">
                    <dt class="col-sm-3">File</dt>
                    <dd class="col-sm-9 text-break" x-text="metadata.name"></dd>
                    <dt class="col-sm-3">Size</dt>
                    <dd class="col-sm-9" x-text="formatBytes(metadata.size)"></dd>
                    <dt class="col-sm-3">Type</dt>
                    <dd class="col-sm-9" x-text="metadata.type || 'video/mp4'"></dd>
                    <dt class="col-sm-3">MD5</dt>
                    <dd class="col-sm-9 font-monospace text-break" x-text="metadata.md5 || 'Unavailable'"></dd>
                  </dl>
                  <div class="form-check">
                    <input class="form-check-input" id="bigscreen-acknowledgement" type="checkbox" x-model="acknowledgementAccepted" :disabled="!metadata.md5">
                    <label class="form-check-label" for="bigscreen-acknowledgement">
                      I acknowledge the video listed above, including its MD5 checksum, and confirm that I own this file or have the proper rights to stream and view it.
                    </label>
                  </div>
                </div>
              </div>
            </template>

            <button class="btn btn-info btn-lg" type="button" @click="startPlayer()" :disabled="!metadata || !channelReady || !acknowledgementAccepted">
              <i class="bi bi-play-fill"></i>
              <span x-text="channelReady ? 'Start Bigscreen player' : 'Connecting to launcher'"></span>
            </button>
          </div>
        </section>
      </template>

      <template x-if="playerStarted">
        <section class="bigscreen-video-stage">
          <video id="bigscreen-video" class="bigscreen-video" crossorigin="anonymous" controls autoplay preload="auto" playsinline></video>
          <div class="bigscreen-status badge text-bg-dark border" x-text="status"></div>
        </section>
      </template>
    </main>
  </body>
</html>
